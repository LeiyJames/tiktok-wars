publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  cached_network_image: ^3.3.1
  video_player: ^2.8.6
  http: ^1.2.1
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
